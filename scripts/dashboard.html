            `<td style="${cellStyle}">${escapeHtml(r.path)}</td>`
            + `<td style="${cellStyle};color:var(--danger)">${escapeHtml(diffCell(r.left))}</td>`
            + `<td style="${cellStyle};color:var(--ok);padding-right:0">${escapeHtml(diffCell(r.right))}</td>`
          table.appendChild(tr)
        }
        wrap.appendChild(table)
        return wrap
      }

      function diffCell(value) {
        // `undefined` → missing key in structural diff; `null` → absent source
        // or level with no value. Render both as "—" for readability; actual
        // JSON `null` vs missing path distinction rarely matters in configs.
        if (value === undefined || value === null) return '—'
        return JSON.stringify(value)
      }

      /** Structural JSON diff. Emits one `{ path, left, right }` per leaf
       *  that differs, where `undefined` on either side means "missing".
       *  Short-circuits when both sides are canonically equal (key order
       *  and array element order normalized) so free-order payloads don't
       *  produce spurious rows.
       *
       *  Arrays are diffed as multisets rather than index-wise — rule option
       *  arrays like `no-restricted-globals`'s 60-entry list are free-order
       *  bags, not ordered sequences. Index-wise walking would produce a
       *  wall of "[0] differs, [1] differs, …" rows whenever the two sides
       *  list the same items in a different order. Multiset diff emits only
       *  the actual set-difference: elements present on one side but not
       *  the other. */
      function jsonDiff(a, b, path = '', out = []) {
        if (canonicalStringify(a) === canonicalStringify(b)) return out
        if (a === undefined || b === undefined) {
          out.push({ left: a, path, right: b })
          return out
        }
        if (typeof a !== typeof b || Array.isArray(a) !== Array.isArray(b) || a === null || b === null) {
          out.push({ left: a, path, right: b })
          return out
        }
        if (typeof a !== 'object') {
          out.push({ left: a, path, right: b })
          return out
        }
        if (Array.isArray(a)) {
          // Identity-field heuristic: ESLint option arrays often carry
          // objects with a natural key field (`no-restricted-globals`
          // → `{name, message}`, `no-restricted-syntax` → `{selector,
          // message}`, naming-convention → `{selector, format, …}`).
          // When every element on both sides has a common identity field,
          // pair entries by that field and diff the payloads — so
          // "same name, different message" shows as ONE row with the
          // message sub-diff, not as two unrelated add/remove rows.
          const identity = (v) => {
            if (!v || typeof v !== 'object' || Array.isArray(v)) return null
            for (const k of ['name', 'selector', 'id', 'key']) {
              if (typeof v[k] === 'string') return `${k}:${v[k]}`
            }
            return null
          }
          const aKeys = a.map(identity)
          const bKeys = b.map(identity)
          if (a.length && b.length && aKeys.every((k) => k !== null) && bKeys.every((k) => k !== null)) {
            const aByKey = new Map()
            const bByKey = new Map()
            for (let i = 0; i < a.length; i++) aByKey.set(aKeys[i], a[i])
            for (let i = 0; i < b.length; i++) bByKey.set(bKeys[i], b[i])
            const allKeys = new Set([...aByKey.keys(), ...bByKey.keys()])
            for (const k of allKeys) jsonDiff(aByKey.get(k), bByKey.get(k), `${path}[${k}]`, out)
            return out
          }
          // Fallback: multiset diff by canonical form. Free-order bags
          // (plain strings, keyless objects) collapse cleanly — only
          // entries present on exactly one side show up.
          const key = (v) => canonicalStringify(v)
          const countsA = new Map()
          const countsB = new Map()
          for (const v of a) countsA.set(key(v), (countsA.get(key(v)) ?? 0) + 1)
          for (const v of b) countsB.set(key(v), (countsB.get(key(v)) ?? 0) + 1)
          const seen = new Set()
          for (const v of a) {
            const k = key(v)
            if (seen.has(k)) continue
            seen.add(k)
            const extra = (countsA.get(k) ?? 0) - (countsB.get(k) ?? 0)
            for (let i = 0; i < extra; i++) out.push({ left: v, path: `${path}[]`, right: undefined })
          }
          for (const v of b) {
            const k = key(v)
            if (seen.has(k)) continue
            seen.add(k)
            const extra = (countsB.get(k) ?? 0) - (countsA.get(k) ?? 0)
            for (let i = 0; i < extra; i++) out.push({ left: undefined, path: `${path}[]`, right: v })
          }
          return out
        }
        const keys = new Set([...Object.keys(a), ...Object.keys(b)])
        for (const k of keys) jsonDiff(a[k], b[k], path ? `${path}.${k}` : k, out)
        return out
      }

      /** Pick whichever options we should show in the textarea.
       *  Edited decision > saved decision > current unicute effective
       *  > plugin recommendedOptions.
       *  Skip options coming from an off side — ESLint materializes rule
       *  schema defaults even for off rules, and feeding those phantom
       *  values into the editor would tempt the user to treat them as
       *  real intent. */
      function pickOptions(decision, rule) {
        if (decision?.options && Array.isArray(decision.options)) return decision.options
        if (rule.unicuteLevel && rule.unicuteLevel !== 'off' && rule.unicuteOptions?.length > 0) {
          return rule.unicuteOptions
        }
        if (rule.recommended && rule.recommended !== 'off' && rule.recommendedOptions?.length > 0) {
          return rule.recommendedOptions
        }
        return []
      }

      function optionsOriginLabel(decision, rule) {
        if (decision?.decision === 'enable' && decision?.options) return 'options (unicute decision)'
        const recSame = JSON.stringify(rule.unicuteOptions ?? []) === JSON.stringify(rule.recommendedOptions ?? [])
        if (rule.unicuteOptions && rule.unicuteOptions.length > 0) {
          return recSame ? 'options (plugin recommended)' : 'options (current unicute override)'
        }
        if (rule.recommendedOptions && rule.recommendedOptions.length > 0) return 'options (plugin recommended)'
        return 'options'
      }

      /** Show the top-level schema keys as a one-line hint. Each schema
       *  entry is an object with `properties` or `oneOf`/`anyOf`; we dig one
       *  level down and list the keys — enough to know what's accepted
       *  without leaving the page. Full schema lives in the docs. */
      function renderSchemaHint(schema) {
        const keys = new Set()
        const walk = (node) => {
          if (!node || typeof node !== 'object') return
          if (node.properties) for (const k of Object.keys(node.properties)) keys.add(k)
          for (const group of ['oneOf', 'anyOf', 'allOf']) if (Array.isArray(node[group])) node[group].forEach(walk)
        }
        for (const entry of schema) walk(entry)
        if (keys.size === 0) return null
        const hint = document.createElement('div')
        hint.style.cssText = 'font-size:11px;color:var(--muted);margin-top:4px;font-family:ui-monospace,Menlo,monospace'
        hint.textContent = `keys: ${[...keys].slice(0, 18).join(', ')}${keys.size > 18 ? '…' : ''}`
        return hint
      }

      function escapeHtml(s) {
        return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
      }

      renderMeta()
      renderStats()
      renderSidebar()
      renderAlerts()
      renderRules()
    </script>
  </body>
</html>
