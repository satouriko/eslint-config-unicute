name: Publish to npm

# Tag-triggered release. Push a `vX.Y.Z` tag and this workflow publishes
# via npm's Trusted Publishers (OIDC) — no token needed, no 2FA prompt.
#
# Setup once on npmjs.com:
#   package → Settings → Trusted Publisher → Add Publisher → GitHub Actions
#     Owner:              satouriko
#     Repository:         eslint-config-unicute
#     Workflow filename:  publish.yml
#     Environment name:   npm

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required so the runner can mint an OIDC token for npm

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the `Environment name` set in the Trusted Publisher form.
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      # Node 24 ships npm >= 11 — required by npm's Trusted Publishers
      # OIDC handshake. Node 22 ships npm v10, which fails the handshake
      # and surfaces a misleading `404 PUT /<package>` after provenance
      # signing. See https://github.com/npm/cli/issues/9088
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Gate: tag-triggered publish must pass the same checks CI runs on
      # every push. If lint or the smoke tests fail the job stops here
      # and npm never sees the publish call.
      - run: pnpm lint
      - run: pnpm test

      # `--provenance` adds a cryptographic attestation linking the
      # published tarball to this workflow run. Shown on the npm page.
      # Auto-pick dist-tag: prerelease versions (e.g. 1.0.0-alpha.1) land on
      # `alpha`/`beta`/`rc`/`next` per their suffix, stable versions on
      # `latest`. Avoids accidentally publishing a prerelease to `latest`.
      - run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-alpha.*) TAG=alpha ;;
            *-beta.*)  TAG=beta ;;
            *-rc.*)    TAG=rc ;;
            *-*)       TAG=next ;;
            *)         TAG=latest ;;
          esac
          echo "Publishing $VERSION to dist-tag $TAG"
          npm publish --tag "$TAG" --access public --provenance
