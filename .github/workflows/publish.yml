name: Publish to npm

# Tag-triggered release. Push a `vX.Y.Z` tag and this workflow publishes
# via npm's Trusted Publishers (OIDC) — no token needed, no 2FA prompt.
#
# Setup once on npmjs.com:
#   package → Settings → Trusted Publisher → Add Publisher → GitHub Actions
#     Owner:              satouriko
#     Repository:         eslint-config-unicute
#     Workflow filename:  publish.yml
#     Environment name:   npm

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required so the runner can mint an OIDC token for npm

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the `Environment name` set in the Trusted Publisher form.
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishers needs npm >= 11.5.1 for the new OIDC handshake.
      # Node 22 ships npm v10, which fails the handshake and surfaces a
      # misleading `404 PUT /<package>`. Force-upgrade npm here.
      # See: https://github.com/npm/cli/issues/9088
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Gate: tag-triggered publish must pass the same checks CI runs on
      # every push. If lint or the smoke tests fail the job stops here
      # and npm never sees the publish call.
      - run: pnpm lint
      - run: pnpm test

      # `--provenance` adds a cryptographic attestation linking the
      # published tarball to this workflow run. Shown on the npm page.
      # `--tag alpha` keeps pre-1.0 releases off the default `latest`.
      - run: npm publish --tag alpha --access public --provenance
